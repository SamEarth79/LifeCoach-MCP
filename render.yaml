services:
  - type: web
    name: lifecoach-api
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: MCP_ALLOWED_HOSTS
        value: lifecoach-api.onrender.com
      - key: MCP_ALLOWED_ORIGINS
        value: https://lifecoach-api.onrender.com
